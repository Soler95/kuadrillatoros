<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Kuadrilla San Fermín 2026</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🐂 Kuadrilla San Fermín 2026</h1>
  <p>Votaciones + comentarios en Google Sheets</p>

  <nav>
    <a href="index.html">Calendario</a>
    <a href="kuadrilla.html">Miembros</a>
  </nav>
</header>

<div class="container">

  <div class="card">
    <h2>📅 Meriendas (7–14 julio)</h2>

    <table>
      <thead>
        <tr>
          <th>Día</th>
          <th>Encargado</th>
          <th>⭐ Voto</th>
          <th>Comentarios</th>
        </tr>
      </thead>

      <tbody id="tabla"></tbody>
    </table>
  </div>

  <div class="card">
    <h2>🏆 Ranking</h2>
    <div id="ranking"></div>
  </div>

</div>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz7dVbX1ZyXYZ7MWxPTaen2DLsWlTIllVhHnKZcF8QHUE8i-drAY6A5fHY2iZYrPg1P/exec";

const datos = [
  { dia: "7 de julio", nombre: "Amaia" },
  { dia: "8 de julio", nombre: "Naj" },
  { dia: "9 de julio", nombre: "Ander" },
  { dia: "10 de julio", nombre: "Izas" },
  { dia: "11 de julio", nombre: "Miren" },
  { dia: "12 de julio", nombre: "Blanca" },
  { dia: "13 de julio", nombre: "Sora" },
  { dia: "14 de julio", nombre: "Uxue" }
];

// ---------- ESTRELLAS ----------
function estrellas(i, actual) {
  let html = "";
  for (let s = 1; s <= 5; s++) {
    html += `
      <span class="star ${s <= actual ? 'active' : ''}"
            onclick="votar(${i}, ${s})">★</span>
    `;
  }
  return html;
}

// ---------- TABLA ----------
function cargarTabla() {
  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  datos.forEach((d, i) => {

    let voto = parseInt(localStorage.getItem("voto_" + i) || 0);

    let comentarios = JSON.parse(localStorage.getItem("comentarios_" + i) || "[]");

    let lista = comentarios.length
      ? comentarios.map(c => `<div class="coment">💬 ${c}</div>`).join("")
      : `<div class="coment vacio">Sin comentarios</div>`;

    tabla.innerHTML += `
      <tr>
        <td><strong>${d.dia}</strong></td>
        <td>${d.nombre}</td>
        <td>${estrellas(i, voto)}</td>
        <td>
          ${lista}

          <div class="inputBox">
            <input id="c_${i}" placeholder="Comentario...">
            <button onclick="comentar(${i})">Enviar</button>
          </div>
        </td>
      </tr>
    `;
  });
}

// ---------- VOTAR ----------
function votar(i, valor) {

  if (localStorage.getItem("voto_" + i)) {
    alert("Ya has votado este día");
    return;
  }

  let nombre = prompt("Escribe tu nombre:");
  if (!nombre) return;

  localStorage.setItem("voto_" + i, valor);

  fetch(GOOGLE_SCRIPT_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      dia: datos[i].dia,
      usuario: nombre,
      tipo: "voto",
      valor: valor
    })
  });

  cargarTabla();
  cargarRanking();
}

// ---------- COMENTARIOS ----------
function comentar(i) {
  const input = document.getElementById("c_" + i);
  const texto = input.value.trim();
  if (!texto) return;

  let nombre = prompt("Tu nombre:");
  if (!nombre) return;

  fetch(GOOGLE_SCRIPT_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      dia: datos[i].dia,
      usuario: nombre,
      tipo: "comentario",
      valor: texto
    })
  });

  input.value = "";
}

// ---------- RANKING LOCAL ----------
function cargarRanking() {
  let r = [];

  datos.forEach((d, i) => {
    let voto = parseInt(localStorage.getItem("voto_" + i) || 0);

    r.push({
      dia: d.dia,
      nombre: d.nombre,
      voto
    });
  });

  r.sort((a, b) => b.voto - a.voto);

  document.getElementById("ranking").innerHTML =
    r.map(x => `
      <div class="rank">
        <strong>${x.dia} - ${x.nombre}</strong>
        <span>⭐ ${x.voto}</span>
      </div>
    `).join("");
}

// INIT
cargarTabla();
cargarRanking();
</script>

</body>
</html>
