<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Kuadrilla San Fermín 2026</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🐂 Kuadrilla San Fermín 2026</h1>
  <p>Votaciones y comentarios en tiempo real</p>

  <nav>
    <a href="index.html">Calendario</a>
    <a href="kuadrilla.html">Miembros</a>
  </nav>
</header>

<div class="container">

  <div class="card">
    <h2>📅 Meriendas (7–14 julio)</h2>
    <table>
      <thead>
        <tr>
          <th>Día</th>
          <th>Encargado</th>
          <th>⭐ Voto</th>
          <th>Comentarios</th>
        </tr>
      </thead>
      <tbody id="tabla"></tbody>
    </table>
  </div>

  <div class="card">
    <h2>🏆 Ranking</h2>
    <div id="ranking">Cargando...</div>
  </div>

</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxoT7_CVuZyGUeawlPv5dyfdFqnDrzuNhY-wc8lLYbstfkHcMxlMBsOCn20qIp9lpmHXw/exec";

const datos = [
  { dia: "7 de julio", nombre: "Amaia" },
  { dia: "8 de julio", nombre: "Naj" },
  { dia: "9 de julio", nombre: "Ander" },
  { dia: "10 de julio", nombre: "Izas" },
  { dia: "11 de julio", nombre: "Miren" },
  { dia: "12 de julio", nombre: "Blanca" },
  { dia: "13 de julio", nombre: "Sora" },
  { dia: "14 de julio", nombre: "Uxue" }
];

// ---------- SAFE FETCH ----------
async function getData() {
  try {
    const res = await fetch(URL);
    const text = await res.text();
    return JSON.parse(text);
  } catch (e) {
    console.error("Error leyendo Google Sheets:", e);
    return [];
  }
}

// ---------- TABLA ----------
function renderTable() {
  const tbody = document.getElementById("tabla");
  tbody.innerHTML = "";

  datos.forEach((d, i) => {
    const voto = localStorage.getItem("voto_" + i) || 0;

    tbody.innerHTML += `
      <tr>
        <td><b>${d.dia}</b></td>
        <td>${d.nombre}</td>
        <td>
          ${[1,2,3,4,5].map(s => `
            <span class="star ${s <= voto ? 'active' : ''}"
            onclick="vote(${i}, ${s})">★</span>
          `).join("")}
        </td>
        <td id="comments_${i}">
          Cargando...
          <div class="inputBox">
            <input id="input_${i}" placeholder="Comentario">
            <button onclick="comment(${i})">Enviar</button>
          </div>
        </td>
      </tr>
    `;
  });
}

// ---------- VOTE ----------
function vote(i, value) {

  if (localStorage.getItem("voto_" + i)) {
    alert("Ya votaste este día");
    return;
  }

  const name = prompt("Tu nombre:");
  if (!name) return;

  localStorage.setItem("voto_" + i, value);

  fetch(URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      dia: datos[i].dia,
      usuario: name,
      tipo: "voto",
      valor: value
    })
  }).then(() => loadAll());
}

// ---------- COMMENT ----------
function comment(i) {
  const input = document.getElementById("input_" + i);
  const text = input.value.trim();
  if (!text) return;

  const name = prompt("Tu nombre:");
  if (!name) return;

  fetch(URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      dia: datos[i].dia,
      usuario: name,
      tipo: "comentario",
      valor: text
    })
  }).then(() => {
    input.value = "";
    loadAll();
  });
}

// ---------- LOAD COMMENTS + RANKING ----------
async function loadAll() {

  const data = await getData();

  const comments = data.filter(x => x.tipo === "comentario");
  const votes = data.filter(x => x.tipo === "voto");

  // COMMENTS
  datos.forEach((d, i) => {

    const el = document.getElementById("comments_" + i);
    if (!el) return;

    const list = comments
      .filter(c => c.dia === d.dia)
      .map(c => `<div class="comment">💬 ${c.usuario}: ${c.valor}</div>`)
      .join("");

    el.innerHTML = `
      ${list || "<div class='empty'>Sin comentarios</div>"}
      <div class="inputBox">
        <input id="input_${i}" placeholder="Comentario">
        <button onclick="comment(${i})">Enviar</button>
      </div>
    `;
  });

  // RANKING
  let map = {};

  votes.forEach(v => {
    if (!map[v.dia]) map[v.dia] = { sum: 0, count: 0 };
    map[v.dia].sum += Number(v.valor);
    map[v.dia].count++;
  });

  let arr = Object.keys(map).map(d => ({
    dia: d,
    avg: map[d].sum / map[d].count
  }));

  arr.sort((a,b) => b.avg - a.avg);

  document.getElementById("ranking").innerHTML =
    arr.map(x => `
      <div class="rank">
        <b>${x.dia}</b>
        <span>⭐ ${x.avg.toFixed(1)}</span>
      </div>
    `).join("");
}

// INIT
renderTable();
loadAll();
setInterval(loadAll, 5000);
</script>

</body>
</html>
