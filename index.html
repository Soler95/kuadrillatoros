<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cuadrilla de Toros - San Fermines</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🐂 Cuadrilla de Toros de San Fermines</h1>
  <p>Calendario de meriendas con votación ⭐</p>
</header>

<div class="container">

  <div class="card">
    <h2>📅 Calendario de meriendas (6–14 julio)</h2>

    <table>
      <thead>
        <tr>
          <th>Día</th>
          <th>Encargado</th>
          <th>⭐ Votos</th>
          <th>Acción</th>
        </tr>
      </thead>

      <tbody id="tabla"></tbody>

    </table>
  </div>

</div>

<script>
const datos = [
  { dia: "6 de julio", nombre: "Juan El Rápido" },
  { dia: "7 de julio", nombre: "Miguel Valentía" },
  { dia: "8 de julio", nombre: "Ander Toro Humano" },
  { dia: "9 de julio", nombre: "Lucas Sin Miedo" },
  { dia: "10 de julio", nombre: "Iker Sprint" },
  { dia: "11 de julio", nombre: "Juan El Rápido" },
  { dia: "12 de julio", nombre: "Miguel Valentía" },
  { dia: "13 de julio", nombre: "Ander Toro Humano" },
  { dia: "14 de julio", nombre: "Lucas Sin Miedo" }
];

function cargarTabla() {
  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  datos.forEach((d, i) => {
    let votos = localStorage.getItem("voto_" + i) || 0;

    tabla.innerHTML += `
      <tr>
        <td>${d.dia}</td>
        <td>${d.nombre}</td>
        <td>⭐ ${votos}</td>
        <td>
          <button onclick="votar(${i})">👍 Votar</button>
        </td>
      </tr>
    `;
  });
}

function votar(i) {
  let votos = parseInt(localStorage.getItem("voto_" + i) || 0);
  votos++;
  localStorage.setItem("voto_" + i, votos);
  cargarTabla();
}

cargarTabla();
</script>

</body>
</html>
