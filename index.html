<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Kuadrilla San Fermín 2026</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🐂 Kuadrilla San Fermín 2026</h1>
  <p>Votaciones y comentarios en tiempo real</p>

  <nav>
    <a href="index.html">Calendario</a>
    <a href="kuadrilla.html">Miembros</a>
  </nav>
</header>

<div class="container">

  <div class="card">
    <h2>📅 Meriendas (7–14 julio)</h2>

    <table>
      <thead>
        <tr>
          <th>Día</th>
          <th>Encargado</th>
          <th>⭐ Voto</th>
          <th>Comentarios</th>
        </tr>
      </thead>

      <tbody id="tabla"></tbody>
    </table>
  </div>

  <div class="card">
    <h2>🏆 Ranking</h2>
    <div id="ranking"></div>
  </div>

</div>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz7dVbX1ZyXYZ7MWxPTaen2DLsWlTIllVhHnKZcF8QHUE8i-drAY6A5fHY2iZYrPg1P/exec";

const datos = [
  { dia: "7 de julio", nombre: "Amaia" },
  { dia: "8 de julio", nombre: "Naj" },
  { dia: "9 de julio", nombre: "Ander" },
  { dia: "10 de julio", nombre: "Izas" },
  { dia: "11 de julio", nombre: "Miren" },
  { dia: "12 de julio", nombre: "Blanca" },
  { dia: "13 de julio", nombre: "Sora" },
  { dia: "14 de julio", nombre: "Uxue" }
];

// ---------- ESTRELLAS ----------
function stars(i, actual) {
  let html = "";
  for (let s = 1; s <= 5; s++) {
    html += `<span class="star ${s <= actual ? 'active' : ''}" onclick="vote(${i}, ${s})">★</span>`;
  }
  return html;
}

// ---------- TABLA ----------
function renderTable() {
  const tbody = document.getElementById("tabla");
  tbody.innerHTML = "";

  datos.forEach((d, i) => {
    const voto = parseInt(localStorage.getItem("voto_" + i) || 0);

    tbody.innerHTML += `
      <tr>
        <td><strong>${d.dia}</strong></td>
        <td>${d.nombre}</td>
        <td>${stars(i, voto)}</td>
        <td class="comments" id="comments_${i}">
          Cargando comentarios...
          <div class="inputBox">
            <input id="input_${i}" placeholder="Comentario...">
            <button onclick="comment(${i})">Enviar</button>
          </div>
        </td>
      </tr>
    `;
  });
}

// ---------- VOTAR ----------
function vote(i, value) {

  if (localStorage.getItem("voto_" + i)) {
    alert("Ya has votado este día");
    return;
  }

  const name = prompt("Tu nombre:");
  if (!name) return;

  localStorage.setItem("voto_" + i, value);

  fetch(GOOGLE_SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      dia: datos[i].dia,
      usuario: name,
      tipo: "voto",
      valor: value
    })
  });

  loadRanking();
  renderTable();
}

// ---------- COMENTARIOS ----------
function comment(i) {
  const input = document.getElementById("input_" + i);
  const text = input.value.trim();
  if (!text) return;

  const name = prompt("Tu nombre:");
  if (!name) return;

  fetch(GOOGLE_SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      dia: datos[i].dia,
      usuario: name,
      tipo: "comentario",
      valor: text
    })
  });

  input.value = "";

  setTimeout(loadComments, 800);
}

// ---------- CARGAR COMENTARIOS GLOBALS ----------
async function loadComments() {
  const res = await fetch(GOOGLE_SCRIPT_URL);
  const data = await res.json();

  const comments = data.filter(x => x.tipo === "comentario");

  datos.forEach((d, i) => {
    const el = document.getElementById("comments_" + i);

    if (!el) return;

    const list = comments
      .filter(c => c.dia === d.dia)
      .map(c => `<div class="comment">💬 <b>${c.usuario}</b>: ${c.valor}</div>`)
      .join("");

    el.innerHTML = `
      ${list || "<div class='empty'>Sin comentarios</div>"}
      <div class="inputBox">
        <input id="input_${i}" placeholder="Comentario...">
        <button onclick="comment(${i})">Enviar</button>
      </div>
    `;
  });
}

// ---------- RANKING ----------
async function loadRanking() {
  const res = await fetch(GOOGLE_SCRIPT_URL);
  const data = await res.json();

  const votes = data.filter(x => x.tipo === "voto");

  let ranking = {};

  votes.forEach(v => {
    if (!ranking[v.dia]) ranking[v.dia] = { total: 0, count: 0, nombre: "" };
    ranking[v.dia].total += Number(v.valor);
    ranking[v.dia].count++;
  });

  let arr = Object.keys(ranking).map(dia => ({
    dia,
    avg: ranking[dia].total / ranking[dia].count
  }));

  arr.sort((a, b) => b.avg - a.avg);

  document.getElementById("ranking").innerHTML =
    arr.map(x => `
      <div class="rank">
        <strong>${x.dia}</strong>
        <span>⭐ ${x.avg.toFixed(1)}</span>
      </div>
    `).join("");
}

// INIT
renderTable();
loadComments();
loadRanking();

setInterval(() => {
  loadComments();
  loadRanking();
}, 5000);
</script>

</body>
</html>
