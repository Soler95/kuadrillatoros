<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cuadrilla de Toros - San Fermines</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🐂 Cuadrilla de Toros de San Fermines</h1>
  <p>Votación de meriendas + comentarios</p>
</header>

<div class="container">

  <!-- CALENDARIO -->
  <div class="card">
    <h2>📅 Calendario de meriendas (6–14 julio)</h2>

    <table>
      <thead>
        <tr>
          <th>Día</th>
          <th>Encargado</th>
          <th>⭐ Voto</th>
          <th>Acción</th>
        </tr>
      </thead>

      <tbody id="tabla"></tbody>
    </table>
  </div>

  <!-- COMENTARIOS -->
  <div class="card">
    <h2>💬 Comentarios de la cuadrilla</h2>

    <textarea id="comentario" placeholder="Escribe tu comentario..."></textarea>
    <button onclick="agregarComentario()">Enviar</button>

    <div id="listaComentarios"></div>
  </div>

</div>

<script>
const datos = [
  { dia: "6 de julio", nombre: "Juan El Rápido" },
  { dia: "7 de julio", nombre: "Miguel Valentía" },
  { dia: "8 de julio", nombre: "Ander Toro Humano" },
  { dia: "9 de julio", nombre: "Lucas Sin Miedo" },
  { dia: "10 de julio", nombre: "Iker Sprint" },
  { dia: "11 de julio", nombre: "Juan El Rápido" },
  { dia: "12 de julio", nombre: "Miguel Valentía" },
  { dia: "13 de julio", nombre: "Ander Toro Humano" },
  { dia: "14 de julio", nombre: "Lucas Sin Miedo" }
];

// ---------- CALENDARIO ----------
function cargarTabla() {
  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  datos.forEach((d, i) => {
    let voto = localStorage.getItem("voto_" + i);

    let estrellas = "";
    for (let s = 1; s <= 5; s++) {
      estrellas += `<span onclick="votar(${i}, ${s})" class="star ${voto >= s ? 'active' : ''}">★</span>`;
    }

    let bloqueado = localStorage.getItem("voto_" + i) ? "disabled" : "";

    tabla.innerHTML += `
      <tr>
        <td>${d.dia}</td>
        <td>${d.nombre}</td>
        <td>${estrellas}</td>
        <td>
          ${voto ? "✔ Votado" : "Selecciona estrellas"}
        </td>
      </tr>
    `;
  });
}

function votar(id, valor) {
  if (localStorage.getItem("voto_" + id)) return; // solo 1 voto
  localStorage.setItem("voto_" + id, valor);
  cargarTabla();
}

// ---------- COMENTARIOS ----------
function agregarComentario() {
  const input = document.getElementById("comentario");
  const texto = input.value.trim();
  if (!texto) return;

  let comentarios = JSON.parse(localStorage.getItem("comentarios") || "[]");
  comentarios.push(texto);
  localStorage.setItem("comentarios", JSON.stringify(comentarios));

  input.value = "";
  cargarComentarios();
}

function cargarComentarios() {
  const lista = document.getElementById("listaComentarios");
  let comentarios = JSON.parse(localStorage.getItem("comentarios") || "[]");

  lista.innerHTML = comentarios.map(c =>
    `<div class="comentario">💬 ${c}</div>`
  ).join("");
}

// INIT
cargarTabla();
cargarComentarios();
</script>

</body>
</html>
