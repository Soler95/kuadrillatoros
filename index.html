<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Kuadrilla Toros 2026</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🐂 Kuadrilla San Fermín 2026</h1>
  <p>Calendario de meriendas + ranking + votaciones reales</p>

  <nav>
    <a href="index.html">Calendario</a>
    <a href="kuadrilla.html">Miembros</a>
  </nav>
</header>

<div class="container">

  <!-- CALENDARIO -->
  <div class="card">
    <h2>📅 Meriendas (7–14 julio)</h2>

    <table>
      <thead>
        <tr>
          <th>Día</th>
          <th>Encargado</th>
          <th>⭐ Voto</th>
          <th>Comentarios</th>
        </tr>
      </thead>

      <tbody id="tabla"></tbody>
    </table>
  </div>

  <!-- RANKING -->
  <div class="card">
    <h2>🏆 Ranking (media de votos)</h2>
    <div id="ranking"></div>
  </div>

</div>

<script>
const datos = [
  { dia: "7 de julio", nombre: "TBC" },
  { dia: "8 de julio", nombre: "TBC" },
  { dia: "9 de julio", nombre: "TBC" },
  { dia: "10 de julio", nombre: "TBC" },
  { dia: "11 de julio", nombre: "TBC" },
  { dia: "12 de julio", nombre: "TBC" },
  { dia: "13 de julio", nombre: "TBC" },
  { dia: "14 de julio", nombre: "TBC" }
];

// ---------- ESTRELLAS ----------
function generarEstrellas(i, actual) {
  let html = "";

  for (let s = 1; s <= 5; s++) {
    html += `
      <span class="star ${s <= actual ? 'active' : ''}"
            onclick="votar(${i}, ${s})">
        ★
      </span>
    `;
  }

  return html;
}

// ---------- TABLA ----------
function cargarTabla() {
  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  datos.forEach((d, i) => {

    let voto = parseInt(localStorage.getItem("voto_" + i) || 0);

    let comentarios = JSON.parse(localStorage.getItem("comentarios_" + i) || "[]");

    let lista = comentarios.length
      ? comentarios.map(c => `<div class="coment">💬 ${c}</div>`).join("")
      : `<div class="coment vacio">Sin comentarios aún</div>`;

    tabla.innerHTML += `
      <tr>
        <td><strong>${d.dia}</strong></td>
        <td>${d.nombre}</td>
        <td class="stars">
          ${generarEstrellas(i, voto)}
        </td>
        <td>
          ${lista}

          <div class="inputBox">
            <input id="c_${i}" placeholder="Escribe comentario...">
            <button onclick="comentar(${i})">Enviar</button>
          </div>
        </td>
      </tr>
    `;
  });
}

// ---------- VOTAR (1 por persona, pero modificable) ----------
function votar(i, v) {
  localStorage.setItem("voto_" + i, v);
  cargarTabla();
  cargarRanking();
}

// ---------- COMENTARIOS ----------
function comentar(i) {
  const input = document.getElementById("c_" + i);
  if (!input.value.trim()) return;

  let arr = JSON.parse(localStorage.getItem("comentarios_" + i) || "[]");
  arr.push(input.value.trim());

  localStorage.setItem("comentarios_" + i, JSON.stringify(arr));

  input.value = "";
  cargarTabla();
}

// ---------- RANKING (MEDIA REAL) ----------
function cargarRanking() {
  let r = [];

  datos.forEach((d, i) => {
    let voto = parseInt(localStorage.getItem("voto_" + i) || 0);

    r.push({
      dia: d.dia,
      nombre: d.nombre,
      media: voto
    });
  });

  r.sort((a, b) => b.media - a.media);

  document.getElementById("ranking").innerHTML =
    r.map(x => `
      <div class="rank">
        <strong>${x.dia} - ${x.nombre}</strong>
        <span>⭐ ${x.media.toFixed(1)}</span>
      </div>
    `).join("");
}

// INIT
cargarTabla();
cargarRanking();
</script>

</body>
</html>
