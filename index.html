<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cuadrilla de San Fermines</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🐂 Cuadrilla de San Fermines</h1>
  <p>Calendario de meriendas + ranking</p>

  <nav>
    <a href="index.html">Calendario</a>
    <a href="kuadrilla.html">Miembros</a>
  </nav>
</header>

<div class="container">

  <!-- CALENDARIO -->
  <div class="card">
    <h2>📅 Meriendas (desde el 7 de julio)</h2>

    <table>
      <thead>
        <tr>
          <th>Día</th>
          <th>Encargado</th>
          <th>⭐ Votos</th>
          <th>Comentarios</th>
        </tr>
      </thead>

      <tbody id="tabla"></tbody>
    </table>
  </div>

  <!-- RANKING -->
  <div class="card">
    <h2>🏆 Ranking</h2>
    <div id="ranking"></div>
  </div>

</div>

<script>
const datos = [
  { dia: "7 de julio", nombre: "Amaia" },
  { dia: "8 de julio", nombre: "Naj" },
  { dia: "9 de julio", nombre: "Ander" },
  { dia: "10 de julio", nombre: "Izas" },
  { dia: "11 de julio", nombre: "Miren" },
  { dia: "12 de julio", nombre: "Blanca" },
  { dia: "13 de julio", nombre: "Sora" },
  { dia: "14 de julio", nombre: "Uxue" },
  { dia: "15 de julio", nombre: "Jon" },
  { dia: "16 de julio", nombre: "Martín" },
  { dia: "17 de julio", nombre: "Zalbon" }
];

// ---------- TABLA ----------
function cargarTabla() {
  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  datos.forEach((d, i) => {
    let voto = localStorage.getItem("voto_" + i);

    let estrellas = "";
    for (let s = 1; s <= 5; s++) {
      estrellas += `<span onclick="votar(${i}, ${s})" class="star ${voto >= s ? 'active' : ''}">★</span>`;
    }

    let comentarios = JSON.parse(localStorage.getItem("comentarios_" + i) || "[]");

    let lista = comentarios.map(c => `<div class="coment">💬 ${c}</div>`).join("");

    tabla.innerHTML += `
      <tr>
        <td>${d.dia}</td>
        <td>${d.nombre}</td>
        <td>${estrellas}</td>
        <td>
          ${lista}
          <div class="inputBox">
            <input id="c_${i}" placeholder="Comentario">
            <button onclick="comentar(${i})">+</button>
          </div>
        </td>
      </tr>
    `;
  });
}

function votar(i, v) {
  if (localStorage.getItem("voto_" + i)) return;
  localStorage.setItem("voto_" + i, v);
  cargarTabla();
  cargarRanking();
}

// ---------- COMENTARIOS ----------
function comentar(i) {
  const input = document.getElementById("c_" + i);
  if (!input.value.trim()) return;

  let arr = JSON.parse(localStorage.getItem("comentarios_" + i) || "[]");
  arr.push(input.value);

  localStorage.setItem("comentarios_" + i, JSON.stringify(arr));
  input.value = "";
  cargarTabla();
}

// ---------- RANKING ----------
function cargarRanking() {
  let r = [];

  datos.forEach((d, i) => {
    r.push({
      nombre: d.nombre,
      dia: d.dia,
      voto: parseInt(localStorage.getItem("voto_" + i) || 0)
    });
  });

  r.sort((a, b) => b.voto - a.voto);

  document.getElementById("ranking").innerHTML =
    r.map(x => `
      <div class="rank">
        <strong>${x.dia} - ${x.nombre}</strong>
        <span>⭐ ${x.voto}</span>
      </div>
    `).join("");
}

cargarTabla();
cargarRanking();
</script>

</body>
</html>
