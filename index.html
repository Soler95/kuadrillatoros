<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cuadrilla de Toros - San Fermines</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🐂 Cuadrilla de Toros de San Fermines</h1>
  <p>Votación de meriendas + comentarios por día</p>
</header>

<div class="container">

  <div class="card">
    <h2>📅 Calendario de meriendas (6–14 julio)</h2>

    <table>
      <thead>
        <tr>
          <th>Día</th>
          <th>Encargado</th>
          <th>⭐ Voto</th>
          <th>Comentarios</th>
        </tr>
      </thead>

      <tbody id="tabla"></tbody>
    </table>
  </div>

  <div class="card">
    <h2>🏆 Ranking de meriendas</h2>
    <div id="ranking"></div>
  </div>

</div>

<script>
const datos = [
  { dia: "6 de julio", nombre: "Juan El Rápido" },
  { dia: "7 de julio", nombre: "Miguel Valentía" },
  { dia: "8 de julio", nombre: "Ander Toro Humano" },
  { dia: "9 de julio", nombre: "Lucas Sin Miedo" },
  { dia: "10 de julio", nombre: "Iker Sprint" },
  { dia: "11 de julio", nombre: "Juan El Rápido" },
  { dia: "12 de julio", nombre: "Miguel Valentía" },
  { dia: "13 de julio", nombre: "Ander Toro Humano" },
  { dia: "14 de julio", nombre: "Lucas Sin Miedo" }
];

// ---------- TABLA ----------
function cargarTabla() {
  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  datos.forEach((d, i) => {
    let voto = localStorage.getItem("voto_" + i);

    let estrellas = "";
    for (let s = 1; s <= 5; s++) {
      estrellas += `<span onclick="votar(${i}, ${s})" class="star ${voto >= s ? 'active' : ''}">★</span>`;
    }

    let comentarios = JSON.parse(localStorage.getItem("comentarios_" + i) || "[]");

    let listaComentarios = comentarios.map(c => `
      <div class="comentario">💬 ${c}</div>
    `).join("");

    tabla.innerHTML += `
      <tr>
        <td>${d.dia}</td>
        <td>${d.nombre}</td>
        <td>${estrellas}</td>
        <td>
          ${listaComentarios}

          <div class="comment-box">
            <input type="text" id="input_${i}" placeholder="Escribe comentario">
            <button onclick="agregarComentario(${i})">+</button>
          </div>
        </td>
      </tr>
    `;
  });
}

function votar(id, valor) {
  if (localStorage.getItem("voto_" + id)) return;
  localStorage.setItem("voto_" + id, valor);
  cargarTabla();
  cargarRanking();
}

// ---------- COMENTARIOS POR DÍA ----------
function agregarComentario(id) {
  const input = document.getElementById("input_" + id);
  const texto = input.value.trim();
  if (!texto) return;

  let comentarios = JSON.parse(localStorage.getItem("comentarios_" + id) || "[]");
  comentarios.push(texto);

  localStorage.setItem("comentarios_" + id, JSON.stringify(comentarios));

  input.value = "";
  cargarTabla();
}

// ---------- RANKING ----------
function cargarRanking() {
  let ranking = [];

  datos.forEach((d, i) => {
    let voto = parseInt(localStorage.getItem("voto_" + i) || 0);
    ranking.push({ dia: d.dia, nombre: d.nombre, voto });
  });

  ranking.sort((a, b) => b.voto - a.voto);

  document.getElementById("ranking").innerHTML =
    ranking.map(r => `
      <div class="ranking-item">
        <strong>${r.dia} - ${r.nombre}</strong>
        <span>⭐ ${r.voto}</span>
      </div>
    `).join("");
}

// INIT
cargarTabla();
cargarRanking();
</script>

</body>
</html>
